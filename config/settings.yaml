# BigA 项目统一配置文件（数据库、Redis、应用参数）

app:
  name: BigA 行情分析
  version: "2.0.0"
  debug: true
  secret_key: your-secret-key-change-in-production
  algorithm: HS256
  access_token_expire_minutes: 1440
  poll_interval_seconds: 300
  swagger_title: BigA Market API
  swagger_description: A股 / 基金ETF / 黄金 行情分析后端（定时拉取，非毫秒级实时）

database:
  host: 127.0.0.1
  port: 3306
  name: bigA_db
  user: admin
  password: "123456"
  charset: utf8mb4

redis:
  host: 127.0.0.1
  port: 6379
  db: 0
  password: ""

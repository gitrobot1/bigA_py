# 复制为 settings.yaml 后按环境修改

app:
  name: BigA 行情分析
  version: "2.0.0"
  debug: true
  secret_key: change-me
  algorithm: HS256
  access_token_expire_minutes: 1440
  poll_interval_seconds: 300
  macro_refresh_every_n_polls: 3
  log_level: INFO
  search_cache_seconds: 120
  swagger_title: BigA Market API
  swagger_description: A股 / 基金ETF / 黄金 行情分析后端

database:
  host: 127.0.0.1
  port: 3306
  name: bigA_db
  user: admin
  password: "your-password"
  charset: utf8mb4

redis:
  host: 127.0.0.1
  port: 6379
  db: 0
  password: ""
